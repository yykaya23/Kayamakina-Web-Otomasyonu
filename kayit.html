<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Kaya Makina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style> body { animation: fadeIn 0.6s ease-in-out; transition: background-color 0.4s, color 0.4s; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } </style>
</head>
<body class="bg-sky-50 dark:bg-slate-900 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] flex items-center justify-center min-h-screen font-sans p-4 selection:bg-blue-500 selection:text-white transition-colors duration-500">

    <div class="absolute top-6 right-6 z-50">
        <button id="theme-toggle" class="w-12 h-12 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center text-sky-600 dark:text-yellow-400 hover:bg-sky-100 dark:hover:bg-slate-700 transition-colors shadow-lg border border-sky-200 dark:border-slate-700">
            <i id="theme-toggle-dark-icon" class="hidden fa-solid fa-moon text-xl"></i>
            <i id="theme-toggle-light-icon" class="hidden fa-solid fa-sun text-xl"></i>
        </button>
    </div>

    <div class="max-w-md w-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-xl dark:shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden border border-sky-200 dark:border-slate-700/50 transition-colors duration-300">
        <div class="bg-gradient-to-br from-blue-100 to-sky-50 dark:from-blue-900 dark:to-slate-900 p-8 text-center border-b border-sky-200 dark:border-slate-700/50">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 dark:bg-blue-500/20 border border-blue-300 dark:border-blue-500/30 rounded-full mb-4 shadow-sm dark:shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                <i class="fa-solid fa-user-plus text-3xl text-blue-600 dark:text-blue-400"></i>
            </div>
            <h1 class="text-2xl font-black text-sky-950 dark:text-white uppercase tracking-wider">Satıcı Hesabı Oluştur</h1>
            <p class="text-sky-700 dark:text-blue-300/70 text-sm mt-2">B2B Pazarına katılın, hemen ilan yükleyin.</p>
        </div>

        <div class="p-8">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-6 p-4 rounded-xl text-sm font-bold flex items-center 
                            {% if category == 'success' %} bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-200 dark:border-emerald-500/30 text-emerald-700 dark:text-emerald-400 {% else %} bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400 {% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/kayit" method="POST" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-sky-700 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">Firma / Ad Soyad</label>
                    <div class="relative">
                        <i class="fa-solid fa-building absolute left-4 top-1/2 -translate-y-1/2 text-sky-400 dark:text-slate-500"></i>
                        <input type="text" name="ad_soyad" required class="w-full pl-12 pr-4 py-3 bg-sky-50 dark:bg-slate-900/50 border border-sky-200 dark:border-slate-700 rounded-xl text-sky-950 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all font-medium placeholder-sky-400 dark:placeholder-slate-600 shadow-inner" placeholder="Kaya Makina Ltd.">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-sky-700 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">Kurumsal E-Posta</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-sky-400 dark:text-slate-500"></i>
                        <input type="email" name="email" required class="w-full pl-12 pr-4 py-3 bg-sky-50 dark:bg-slate-900/50 border border-sky-200 dark:border-slate-700 rounded-xl text-sky-950 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all font-medium placeholder-sky-400 dark:placeholder-slate-600 shadow-inner" placeholder="is@adresiniz.com">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-sky-700 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">WhatsApp Numarası</label>
                    <div class="relative">
                        <i class="fa-brands fa-whatsapp absolute left-4 top-1/2 -translate-y-1/2 text-sky-400 dark:text-slate-500 text-lg"></i>
                        <input type="tel" name="telefon" required class="w-full pl-12 pr-4 py-3 bg-sky-50 dark:bg-slate-900/50 border border-sky-200 dark:border-slate-700 rounded-xl text-sky-950 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all font-medium placeholder-sky-400 dark:placeholder-slate-600 shadow-inner" placeholder="0532 123 45 67">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-sky-700 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">Güçlü Bir Şifre</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-sky-400 dark:text-slate-500"></i>
                        <input type="password" name="sifre" required class="w-full pl-12 pr-4 py-3 bg-sky-50 dark:bg-slate-900/50 border border-sky-200 dark:border-slate-700 rounded-xl text-sky-950 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all font-medium placeholder-sky-400 dark:placeholder-slate-600 shadow-inner" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold shadow-md dark:shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all active:scale-95 uppercase tracking-widest text-sm border border-blue-500">
                    Kayıt İşlemini Tamamla
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-sky-100 dark:border-slate-700/50 text-center flex flex-col gap-3">
                <a href="/" class="text-sky-600 dark:text-slate-400 text-xs font-bold uppercase tracking-widest hover:text-sky-900 dark:hover:text-white transition-colors"><i class="fa-solid fa-arrow-left mr-1"></i> Vitrine Dön</a>
                <p class="text-sky-800 dark:text-slate-500 text-xs font-bold uppercase tracking-widest">Zaten Hesabınız Var Mı?</p>
                <a href="/giris" class="text-blue-600 dark:text-blue-400 font-bold hover:text-blue-700 dark:hover:text-blue-300 mt-1 inline-block transition-colors border border-blue-300 dark:border-blue-500/30 px-6 py-2 rounded-lg bg-blue-50 dark:bg-blue-500/10">Sisteme Giriş Yap</a>
            </div>
        </div>
    </div>

    <script>
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        const themeToggleBtn = document.getElementById('theme-toggle');

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>
